<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>{% block title %}PrecisionGrow{% endblock %}</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Font Awesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

  <!-- Custom CSS -->
  <link href="{{ url_for('static', filename='css/styles.css') }}?v=10" rel="stylesheet">

  <style>

  body {
    background: linear-gradient(135deg, #d4ecdd, #eef7f2, #eaf6f6);
    font-family: 'Segoe UI', sans-serif;
    transition: 0.3s;
  }

  /* NAVBAR */
  .navbar {
    backdrop-filter: blur(12px);
    background: rgba(255,255,255,0.8);
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
  }

  .navbar-brand {
    font-weight: 700;
    color: #2e7d32 !important;
  }

  /* MAIN CONTAINER */
  main.container {
    background: rgba(255,255,255,0.65);
    backdrop-filter: blur(12px);
    border-radius: 18px;
    padding: 30px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.08);
  }

  /* CARDS */
  .card {
    border-radius: 16px;
    border: none;
    box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    transform: translateY(10px);
    opacity: 0;
    transition: 0.4s;
  }

  /* DARK MODE */
  body.dark-mode {
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color: #e0e0e0;
  }

  body.dark-mode main.container {
    background: rgba(20,20,20,0.85);
  }

  body.dark-mode .card {
    background: #1e1e1e;
  }

  footer {
    margin-top: 40px;
    text-align: center;
    color: #666;
  }

  </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg">
  <div class="container">

    <a class="navbar-brand" href="{{ url_for('home') }}">
      <i class="fa-solid fa-seedling me-2"></i>
      PrecisionGrow
    </a>

    <div class="ms-auto d-flex align-items-center gap-2">

      <!-- DARK MODE -->
      <button id="themeToggle" class="btn btn-outline-dark btn-sm">
        <i class="fa-solid fa-moon"></i>
      </button>

      {% if session.get('user') %}
        <div class="small">
          <i class="fa-solid fa-user"></i>
          {{ session['user'] }}
        </div>
        <a class="btn btn-success btn-sm" href="{{ url_for('logout') }}">
          <i class="fa-solid fa-right-from-bracket"></i>
        </a>
      {% endif %}

    </div>
  </div>
</nav>

<!-- CONTENT -->
<main class="container my-4">
  {% block content %}{% endblock %}
</main>

<!-- FOOTER -->
<footer>
  © 2025 PrecisionGrow · Smart Farming Dashboard 🌱
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>

<script>

// DARK MODE
document.addEventListener("DOMContentLoaded", () => {

  const btn = document.getElementById("themeToggle");

  if(localStorage.getItem("theme")==="dark"){
    document.body.classList.add("dark-mode");
    btn.innerHTML='<i class="fa-solid fa-sun"></i>';
  }

  btn.onclick = () => {
    document.body.classList.toggle("dark-mode");

    if(document.body.classList.contains("dark-mode")){
      localStorage.setItem("theme","dark");
      btn.innerHTML='<i class="fa-solid fa-sun"></i>';
    } else {
      localStorage.setItem("theme","light");
      btn.innerHTML='<i class="fa-solid fa-moon"></i>';
    }
  };

  // CARD ANIMATION
  document.querySelectorAll('.card').forEach((c,i)=>{
    setTimeout(()=>{
      c.style.opacity=1;
      c.style.transform='translateY(0)';
    },150+i*80);
  });

});

</script>

{% block scripts %}{% endblock %}

</body>
</html>
