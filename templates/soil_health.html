{% extends "home.html" %}

{% block title %}Soil Health · PrecisionGrow{% endblock %}

{% block content %}

<h3 class="mb-4">
  🌱 Soil Health Monitoring Dashboard
</h3>

<div class="row g-4">

  <!-- LIVE METRICS -->
  <div class="col-md-6">
    <div class="card p-3">
      <h5>📊 Live Metrics</h5>
      <div id="liveMetrics">Loading...</div>
    </div>
  </div>

  <!-- RECOMMENDATIONS -->
  <div class="col-md-6">
    <div class="card p-3">
      <h5> Recommendations</h5>
      <div id="liveRecs"></div> <!--  Removed default "Loading..." -->
    </div>
  </div>

</div>

<!-- CHART -->
<div class="card p-3 mt-4">
  <h5>Live Soil Sensor Graph</h5>

  <div style="height: 320px;">
    <canvas id="liveFeedChart"></canvas>
  </div>
</div>

{% endblock %}

{% block scripts %}

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

const canvas = document.getElementById('liveFeedChart');
const ctx = canvas ? canvas.getContext('2d') : null;

/* DARK MODE */
function isDarkMode() {
  return document.body.classList.contains('dark-mode');
}

/* CHART STYLE */
function getChartOptions() {
  const dark = isDarkMode();

  return {
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: {
        labels: {
          color: dark ? "#e5e7eb" : "#333"
        }
      }
    },
    scales: {
      x: {
        grid: { color: dark ? "#374151" : "#e5e7eb" },
        ticks: { color: dark ? "#ccc" : "#333" }
      },
      y: {
        beginAtZero: true,
        grid: { color: dark ? "#374151" : "#e5e7eb" },
        ticks: { color: dark ? "#ccc" : "#333" }
      }
    }
  };
}

/* INIT CHART */
let liveChart = null;

if (ctx && typeof Chart !== "undefined") {
  liveChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: [],
      datasets: [
        {
          label: 'pH',
          data: [],
          borderColor: '#2e7d32',
          tension: 0.4
        },
        {
          label: 'Temperature',
          data: [],
          borderColor: '#f39c12',
          tension: 0.4
        },
        {
          label: 'Soil Moisture',
          data: [],
          borderColor: '#0288d1',
          tension: 0.4
        }
      ]
    },
    options: getChartOptions()
  });
}

/* FETCH LIVE DATA */
async function fetchLive() {
  try {

    const metricsEl = document.getElementById('liveMetrics');
    const recsEl = document.getElementById('liveRecs');

    const res = await fetch('/soil-health-live');

    if (!res.ok) throw new Error("API error");

    const json = await res.json();

    const data = json.data || {};
    const recs = json.recommendations || {};

    /* CLEAR UI */
    if (metricsEl) metricsEl.innerHTML = "";
    if (recsEl) recsEl.innerHTML = "";

    /* METRICS */
    for (const [key, value] of Object.entries(data)) {
      metricsEl.innerHTML += `
        <div class="d-flex justify-content-between border-bottom py-1">
          <span>${key.toUpperCase()}</span>
          <b>${value}</b>
        </div>
      `;
    }

    /* RECOMMENDATIONS (NO "SOIL IS HEALTHY") */
    if (Object.keys(recs).length !== 0) {
      for (const r of Object.values(recs)) {
        recsEl.innerHTML += `
          <div class="alert alert-warning py-1 mb-2">
            ${r}
          </div>
        `;
      }
    }
    //  else → DO NOTHING (blank)

    /* CHART UPDATE */
    if (liveChart) {

      const time = new Date().toLocaleTimeString();

      liveChart.data.labels.push(time);
      liveChart.data.datasets[0].data.push(data.ph ?? 0);
      liveChart.data.datasets[1].data.push(data.temperature ?? 0);
      liveChart.data.datasets[2].data.push(data.soil_moisture ?? 0);

      if (liveChart.data.labels.length > 12) {
        liveChart.data.labels.shift();
        liveChart.data.datasets.forEach(d => d.data.shift());
      }

      liveChart.update();
    }

  } catch (err) {
    console.error("Live error:", err);

    document.getElementById('liveMetrics').innerHTML =
      " Error loading sensor data";

    document.getElementById('liveRecs').innerHTML =
      "Backend / ThingSpeak issue";
  }
}

/* AUTO REFRESH */
fetchLive();
setInterval(fetchLive, 10000);

/* DARK MODE SYNC */
document.getElementById('themeToggle')?.addEventListener('click', () => {
  setTimeout(() => {
    if (liveChart) {
      liveChart.options = getChartOptions();
      liveChart.update();
    }
  }, 200);
});

</script>

{% endblock %}
