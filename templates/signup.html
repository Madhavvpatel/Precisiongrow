{% extends "home.html" %}
{% block title %}Sign Up · PrecisionGrow{% endblock %}

{% block content %}

<style>
/* Premium Signup Styling */
.signup-card {
  backdrop-filter: blur(14px);
  background: rgba(255, 255, 255, 0.75);
  border-radius: 18px;
  border: 1px solid rgba(255,255,255,0.3);
  box-shadow: 0 20px 40px rgba(0,0,0,0.08);
  transition: all 0.3s ease;
}

.signup-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 25px 50px rgba(0,0,0,0.12);
}

.signup-title {
  font-weight: 700;
  letter-spacing: 0.5px;
}

.signup-subtitle {
  font-size: 0.9rem;
  color: #6c757d;
}

.form-control {
  border-radius: 10px;
  padding: 12px;
  border: 1px solid rgba(0,0,0,0.1);
  transition: all 0.2s ease;
}

.form-control:focus {
  border-color: #28a745;
  box-shadow: 0 0 0 2px rgba(40,167,69,0.15);
}

.btn-success {
  border-radius: 10px;
  font-weight: 600;
  letter-spacing: 0.3px;
  padding: 12px;
}

.signup-icon {
  font-size: 40px;
  color: #28a745;
  background: rgba(40,167,69,0.1);
  width: 70px;
  height: 70px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: auto;
}
</style>

<div class="container d-flex align-items-center justify-content-center" style="min-height:75vh;">
  <div class="signup-card p-4" style="max-width:420px; width:100%;">

<form method="POST" autocomplete="off">
  <div class="mb-3">
    <label class="form-label fw-semibold">Username</label>
    <input type="text" name="username" class="form-control" placeholder="Choose a username" required>
  </div>

  <div class="mb-3">
    <label class="form-label fw-semibold">Password</label>
    <input type="password" name="password" class="form-control" placeholder="Create a password" required>
  </div>

  {% if error %}
  <div class="alert alert-danger text-center py-2">{{ error }}</div>
  {% endif %}

  <div class="d-grid mb-3">
    <button type="submit" class="btn btn-success btn-lg">
      <i class="fa-solid fa-user-check me-2"></i> Sign Up
    </button>
  </div>

  <div class="text-center">
    <p class="mb-0 text-muted">
      Already registered?
      <a href="{{ url_for('login') }}" class="fw-semibold text-success">Login here</a>
    </p>
  </div>
</form>

<div class="text-center mt-3">
  <a href="{{ url_for('home') }}" class="btn btn-outline-success w-100">
    <i class="fa-solid fa-arrow-left me-2"></i> Back to Home
  </a>
</div>
