{% extends "home.html" %}
{% block title %}Login · PrecisionGrow{% endblock %}

{% block content %}

<style>
/* Premium Login Styling */
.login-card {
  backdrop-filter: blur(14px);
  background: rgba(255, 255, 255, 0.75);
  border-radius: 18px;
  border: 1px solid rgba(255,255,255,0.3);
  box-shadow: 0 20px 40px rgba(0,0,0,0.08);
  transition: all 0.3s ease;
}

.login-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 25px 50px rgba(0,0,0,0.12);
}

.login-title {
  font-weight: 700;
  letter-spacing: 0.5px;
}

.login-subtitle {
  font-size: 0.9rem;
  color: #6c757d;
}

.form-control {
  border-radius: 10px;
  padding: 12px;
  border: 1px solid rgba(0,0,0,0.1);
  transition: all 0.2s ease;
}

.form-control:focus {
  border-color: #28a745;
  box-shadow: 0 0 0 2px rgba(40,167,69,0.15);
}

.btn-success {
  border-radius: 10px;
  font-weight: 600;
  letter-spacing: 0.3px;
  padding: 12px;
}

.login-icon {
  font-size: 40px;
  color: #28a745;
  background: rgba(40,167,69,0.1);
  width: 70px;
  height: 70px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: auto;
}
</style>

<div class="container d-flex align-items-center justify-content-center" style="min-height: 75vh;">
  <div class="login-card p-4" style="max-width: 420px; width: 100%;">

```

  <h3 class="login-title text-success">PrecisionGrow</h3>

</div>

<!-- FORM -->
<form method="POST" autocomplete="off">
  <div class="mb-3">
    <label class="form-label fw-semibold">Username</label>
    <input type="text" name="username" class="form-control" placeholder="Enter your username" required>
  </div>

  <div class="mb-3">
    <label class="form-label fw-semibold">Password</label>
    <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
  </div>

  {% if error %}
  <div class="alert alert-danger text-center py-2">{{ error }}</div>
  {% endif %}

  <div class="d-grid mb-3">
    <button type="submit" class="btn btn-success btn-lg">
      <i class="fa-solid fa-right-to-bracket me-2"></i> Login
    </button>
  </div>

  <div class="text-center">
    <p class="mb-0 text-muted">
      New user?
      <a href="{{ url_for('signup') }}" class="fw-semibold text-success">Create account</a>
    </p>
  </div>
</form>
